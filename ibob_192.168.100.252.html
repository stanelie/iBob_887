<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ibob</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; overflow: hidden; }
    #stream-img { display: none; width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>
<body>
  <img id="stream-img" alt="" />

  <script>
    const filename = window.location.pathname.split('/').pop();
    const ipMatch  = filename.match(/(\d{1,3}(?:\.\d{1,3}){3})[^.]*?(\d{4,5})?(?=\.html)/);
    const ip       = ipMatch ? ipMatch[1] : '10.8.1.184';
    const port     = ipMatch && ipMatch[2] ? ipMatch[2] : '8080';
    const BASE_URL      = 'http://' + ip + ':' + port;
    const STREAM_URL    = BASE_URL + '/video';
    const PROBE_URL     = BASE_URL + '/shot.jpg';
    const RETRY_DELAY   = 1000;
    const WATCHDOG_INT  = 2000;
    const PROBE_TIMEOUT = 2000;

    const img = document.getElementById('stream-img');

    let appState = 'offline';
    const timers = { retry: null, watchdog: null, connTimeout: null, probeTimeout: null };

    function clearAllTimers() {
      Object.keys(timers).forEach(k => { clearTimeout(timers[k]); timers[k] = null; });
    }

    function goOffline() {
      if (appState === 'offline') return;
      appState = 'offline';
      clearAllTimers();
      img.onload = img.onerror = null;
      img.src = '';
      img.style.display = 'none';
      timers.retry = setTimeout(startProbe, RETRY_DELAY);
    }

    function startProbe() {
      let p = new Image();
      timers.probeTimeout = setTimeout(() => {
        p.onload = p.onerror = null; p.src = ''; p = null;
        onProbeDone(false);
      }, PROBE_TIMEOUT);
      p.onload  = () => { clearTimeout(timers.probeTimeout); timers.probeTimeout = null; onProbeDone(true); };
      p.onerror = () => { clearTimeout(timers.probeTimeout); timers.probeTimeout = null; onProbeDone(false); };
      p.src = PROBE_URL + '?t=' + Date.now();
    }

    function onProbeDone(success) {
      if (success) {
        startStream();
      } else {
        timers.retry = setTimeout(startProbe, RETRY_DELAY);
      }
    }

    function startStream() {
      appState = 'connecting';
      img.onload = img.onerror = null;
      img.src = '';
      timers.connTimeout = setTimeout(() => {
        if (appState === 'connecting') goOffline();
      }, PROBE_TIMEOUT + 1000);
      img.onload = () => {
        clearTimeout(timers.connTimeout); timers.connTimeout = null;
        appState = 'live';
        img.style.display = 'block';
        scheduleWatchdog();
      };
      img.onerror = () => {
        clearTimeout(timers.connTimeout); timers.connTimeout = null;
        goOffline();
      };
      img.src = STREAM_URL + '?t=' + Date.now();
    }

    function scheduleWatchdog() {
      clearTimeout(timers.watchdog);
      timers.watchdog = setTimeout(runWatchdog, WATCHDOG_INT);
    }

    function runWatchdog() {
      if (appState !== 'live') return;
      let p = new Image();
      timers.probeTimeout = setTimeout(() => {
        p.onload = p.onerror = null; p.src = ''; p = null;
        if (appState === 'live') goOffline();
      }, PROBE_TIMEOUT);
      p.onload  = () => { clearTimeout(timers.probeTimeout); timers.probeTimeout = null; if (appState === 'live') scheduleWatchdog(); };
      p.onerror = () => { clearTimeout(timers.probeTimeout); timers.probeTimeout = null; if (appState === 'live') goOffline(); };
      p.src = PROBE_URL + '?t=' + Date.now();
    }

    startProbe();

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && appState === 'offline') { clearTimeout(timers.retry); startProbe(); }
    });
  </script>
</body>
</html>
